<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Tower Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="loading">
    <div class="container">
        <header>
            <h1>Corporate Tower Analyzer</h1>
            <p class="data-timestamp" id="dataTimestamp"></p>
        </header>

        <div class="stats-section">
            <h2>Overall Statistics</h2>
            <div id="overallStats" class="stats-grid"></div>
        </div>

        <div class="chart-section">
            <h2>Players by Highest Level Reached</h2>
            <div id="floorChart" class="chart-container"></div>
        </div>

        <div class="leaderboard-section">
            <h2>Leaderboard</h2>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script type="module">
        import { calculateFloor, formatHeight, FLOOR_HEIGHTS } from './utils.js';

        let currentStats = null;

        // Wayback machine timestamp: 20251130081316 (YYYYMMDDHHMMSS in UTC)
        const waybackTimestamp = '20251130081316';

        // Parse and display data timestamp
        function displayDataTimestamp() {
            const year = waybackTimestamp.substring(0, 4);
            const month = waybackTimestamp.substring(4, 6);
            const day = waybackTimestamp.substring(6, 8);
            const hour = waybackTimestamp.substring(8, 10);
            const minute = waybackTimestamp.substring(10, 12);
            const second = waybackTimestamp.substring(12, 14);

            // Create UTC date
            const utcDate = new Date(Date.UTC(year, month - 1, day, hour, minute, second));

            // Format in user's local timezone
            const localDate = utcDate.toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                timeZoneName: 'short'
            });

            document.getElementById('dataTimestamp').textContent = `Data as of ${localDate}`;
        }

        // Display timestamp on load
        displayDataTimestamp();

        // Format number with commas
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Format date as "Nov 1, 2025"
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Format duration as "3h 2m 50s" or "5m 20s"
        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);

            let result = '';
            if (h > 0) result += h + 'h ';
            if (m > 0) result += m + 'm ';
            if (s > 0 || result === '') result += s + 's';
            return result.trim();
        }

        // Analyze player data
        function analyzeData(players) {
            if (!Array.isArray(players)) {
                console.error('Expected players to be an array');
                return {
                    totalPlayers: 0,
                    completedPlayers: 0,
                    floorStats: {},
                    players: []
                };
            }

            const stats = {
                totalPlayers: players.length,
                completedPlayers: 0,
                floorStats: {},
                players: []
            };

            // Initialize floor stats (0-21)
            for (let i = 0; i <= FLOOR_HEIGHTS.length; i++) {
                stats.floorStats[i] = 0;
            }

            players.forEach(player => {
                const rawHeight = player.maxHeight || 0;
                const formattedHeight = parseFloat(formatHeight(rawHeight));
                const floor = calculateFloor(formattedHeight);
                const bestTime = player.bestVerifiedTime || player.bestTime;
                const completed = floor >= 21;

                if (completed) {
                    stats.completedPlayers++;
                }

                // Floor statistics
                stats.floorStats[floor] = (stats.floorStats[floor] || 0) + 1;

                // Store player data
                stats.players.push({
                    name: player.name,
                    floor,
                    height: formattedHeight.toFixed(1),
                    bestTime: bestTime,
                    completed,
                    updatedAt: player.updatedAt
                });
            });

            return stats;
        }

        // Load data from results.json
        async function loadData() {
            try {
                const response = await fetch('results.json');
                if (!response.ok) {
                    throw new Error(`Failed to load results.json: ${response.status}`);
                }
                const players = await response.json();
                return players;
            } catch (error) {
                console.error('Error loading data from results.json:', error);
                return [];
            }
        }

        // Load and display stats
        async function loadStats() {
            try {
                const players = await loadData();
                const stats = analyzeData(players);
                currentStats = stats;
                displayStats(stats);
                document.body.classList.remove('loading');
            } catch (error) {
                console.error('Error loading stats:', error);
                document.body.classList.remove('loading');
                document.getElementById('overallStats').innerHTML = '<div class="error" style="grid-column: 1/-1; text-align: center; padding: 40px;">Unable to load data. Please refresh the page.</div>';
            }
        }

        function displayStats(stats) {
            // Overall statistics
            const overallDiv = document.getElementById('overallStats');
            overallDiv.innerHTML = `
                <div class="stat-card">
                    <h3>Total Players</h3>
                    <p class="stat-number">${formatNumber(stats.totalPlayers)}</p>
                </div>
                <div class="stat-card">
                    <h3>Completed Runs</h3>
                    <p class="stat-number">${formatNumber(stats.completedPlayers)}</p>
                </div>
            `;

            // Level chart - show all levels 1-21 with linear scale
            const chartDiv = document.getElementById('floorChart');
            let chartHTML = '<div class="chart-bars">';
            const maxPlayers = Math.max(...Object.values(stats.floorStats), 1);

            // Show all levels from 1 to 21
            for (let floor = 1; floor <= 21; floor++) {
                const count = stats.floorStats[floor] || 0;
                const heightPercent = maxPlayers > 0 ? (count / maxPlayers) * 100 : 0;
                const minHeightPx = 25;
                const labelHeightPx = 30;
                const displayHeight = count > 0 ? `calc(((100% - ${labelHeightPx}px - ${minHeightPx}px) * ${heightPercent / 100}) + ${minHeightPx}px)` : '0';

                chartHTML += `
                    <div class="chart-bar-container" onclick="showFloorDetails(${floor})">
                        <div class="chart-bar" style="height: ${displayHeight}">
                            ${count > 0 ? `<div class="chart-bar-value">${formatNumber(count)}</div>` : ''}
                        </div>
                        <div class="chart-bar-label">L${floor}</div>
                    </div>
                `;
            }
            chartHTML += '</div>';
            chartDiv.innerHTML = chartHTML;

            // Leaderboard - sort by completion status, then by time or height
            const leaderboardDiv = document.getElementById('leaderboard');
            const sortedPlayers = stats.players.sort((a, b) => {
                // Both completed: sort by best time
                if (a.completed && b.completed) {
                    if (a.bestTime && b.bestTime) {
                        return a.bestTime - b.bestTime;
                    }
                    // If one has time and other doesn't, prioritize the one with time
                    if (a.bestTime && !b.bestTime) return -1;
                    if (!a.bestTime && b.bestTime) return 1;
                    // Both completed but no times: sort by height
                    return parseFloat(b.height) - parseFloat(a.height);
                }

                // Only one completed: prioritize completed
                if (a.completed && !b.completed) return -1;
                if (!a.completed && b.completed) return 1;

                // Neither completed: sort by height
                return parseFloat(b.height) - parseFloat(a.height);
            });

            let leaderboardHTML = '<div class="scrollable-table-container"><table class="leaderboard-table">';
            leaderboardHTML += '<thead><tr>';
            leaderboardHTML += '<th style="width: 80px; text-align: center;">Rank</th>';
            leaderboardHTML += '<th style="width: 200px; text-align: center;">Player</th>';
            leaderboardHTML += '<th style="text-align: center;">Highest Level</th>';
            leaderboardHTML += '<th style="text-align: center;">Max Height</th>';
            leaderboardHTML += '<th style="text-align: center;">Best Time</th>';
            leaderboardHTML += '<th style="width: 140px; text-align: center;">Date</th>';
            leaderboardHTML += '</tr></thead><tbody>';

            sortedPlayers.forEach((player, index) => {
                let colorStyle = '';
                if (index === 0) colorStyle = 'color: rgb(248, 185, 83);';
                else if (index === 1) colorStyle = 'color: rgb(165, 166, 176);';
                else if (index === 2) colorStyle = 'color: rgb(226, 123, 92);';

                const bestTime = player.bestTime ? formatDuration(player.bestTime) : '-';
                const dateFormatted = player.updatedAt ? formatDate(player.updatedAt) : '-';

                leaderboardHTML += `
                    <tr style="cursor: default; ${colorStyle}">
                        <td style="width: 80px; text-align: center;">${index + 1}</td>
                        <td style="width: 200px;">${player.name}</td>
                        <td style="text-align: center;">Level ${player.floor}</td>
                        <td style="text-align: center;">${player.height}m</td>
                        <td style="text-align: center;">${bestTime}</td>
                        <td style="width: 140px; text-align: center;">${dateFormatted}</td>
                    </tr>
                `;
            });

            leaderboardHTML += '</tbody></table></div>';
            leaderboardDiv.innerHTML = leaderboardHTML;
        }

        // Show floor details modal
        window.showFloorDetails = function(floorNumber) {
            if (!currentStats) return;

            const playersOnFloor = currentStats.players.filter(p => p.floor === floorNumber);
            if (playersOnFloor.length === 0) return;

            // Check if any players have a best time
            const hasAnyBestTime = playersOnFloor.some(p => p.bestTime);

            const modal = document.createElement('div');
            modal.className = 'modal';

            let playersHTML = '<div class="scrollable-table-container" style="max-height: calc(80vh - 120px); overflow-y: auto;"><table class="runs-table"><thead><tr><th style="width: 250px; text-align: center;">Player</th><th style="text-align: center;">Height</th>';
            if (hasAnyBestTime) {
                playersHTML += '<th style="text-align: center;">Best Time</th>';
            }
            playersHTML += '<th style="width: 140px; text-align: center;">Date</th></tr></thead><tbody>';

            playersOnFloor.forEach(player => {
                const dateFormatted = player.updatedAt ? formatDate(player.updatedAt) : '-';
                playersHTML += `
                    <tr style="cursor: default;">
                        <td style="width: 250px;">${player.name}</td>
                        <td style="text-align: center;">${player.height}m</td>`;
                if (hasAnyBestTime) {
                    const bestTime = player.bestTime ? formatDuration(player.bestTime) : '-';
                    playersHTML += `
                        <td style="text-align: center;">${bestTime}</td>`;
                }
                playersHTML += `
                        <td style="width: 140px; text-align: center;">${dateFormatted}</td>
                    </tr>
                `;
            });
            playersHTML += '</tbody></table></div>';

            modal.innerHTML = `
                <div class="modal-content" style="display: flex; flex-direction: column; max-height: 80vh;">
                    <span class="close" onclick="this.parentElement.parentElement.remove()">&times;</span>
                    <h2 style="flex-shrink: 0;">Level ${floorNumber} - ${playersOnFloor.length} Player${playersOnFloor.length !== 1 ? 's' : ''}</h2>
                    ${playersHTML}
                </div>
            `;
            document.body.appendChild(modal);

            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        };

        // Load stats on page load
        loadStats();
    </script>
</body>
</html>
